# Mystic Forge — Taxonomy v1 Canonical Fixture Set
# Phase 2a deliverable. See "Phase 2a Taxonomy v1 Design Spec — April 23, 2026"
# in Anytype.
#
# Each card entry specifies the expected LLM output (leaf-level tags). The
# ancestor-materialization writer (Phase 2b) expands the `synergy_hooks` leaves
# into leaves + all ancestors before writing to card_tags.synergy_hooks. So
# Doubling Season lists [counter_doubler, token_doubler] here; the DB row will
# end up with [counter_doubler, plus_one_counter_matters, counter_matters,
# token_doubler, token_matters].
#
# `mechanic_tags` lists Scryfall keywords + LLM-detected named constructs.
# `tribal_interest` captures specific creature types a card cares about (empty
# if the card is not type-parameterized or picks a type at ETB).
#
# Categories covered:
#   - Format staples (8)
#   - Classification-rule stressors (4)
#   - Archetype representatives (~20)
#   - Stax tests (3)
#   - Multi-face stressors (3)
#   - Snow basic (1)
#   - Additional variety (~14)
#
# Dual purpose: (1) compilation anchor — when leaf vocabulary is compiled,
# these cards MUST tag correctly against it. (2) LLM regression suite —
# Phase 2b's classifier runs this fixture set as an automated test oracle.

