name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true
      - name: Unit tests
        run: dotnet test tests/MysticForge.UnitTests --no-build --configuration Release --verbosity normal

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true
      - name: Integration tests (Testcontainers)
        run: dotnet test tests/MysticForge.IntegrationTests --no-build --configuration Release --verbosity normal

  format-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Verify formatting (style + analyzers, whitespace excluded)
        run: |
          dotnet format style --verify-no-changes
          dotnet format analyzers --verify-no-changes

  nuget-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
      - name: Audit NuGet packages for known vulnerabilities
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee /tmp/audit.txt
          if grep -q "has the following vulnerable" /tmp/audit.txt; then
            echo "::error::Vulnerable NuGet packages detected. Review the output above."
            exit 1
          fi

  verify-spellbook-codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Install Kiota
        run: dotnet tool install --global Microsoft.OpenApi.Kiota
      - name: Regenerate Spellbook client
        run: ./scripts/regen-spellbook-client.sh
      - name: Fail if generated files drifted
        run: |
          if ! git diff --quiet; then
            echo "Generated Spellbook client is out of date. Run scripts/regen-spellbook-client.sh and commit."
            git --no-pager diff --stat
            exit 1
          fi
