services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mysticforge-postgres
    environment:
      POSTGRES_DB: mysticforge
      POSTGRES_USER: mysticforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mysticforge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
